name: Update Pintu Video Trends

on:
  workflow_dispatch:
  schedule:
    - cron: "26 6 * * *"
    - cron: "50 10 * * *"
    - cron: "20 14 * * *"
    - cron: "50 16 * * *"
    - cron: "34 20 * * *"

permissions:
  contents: write

concurrency:
  group: update-pintu-video-trends
  cancel-in-progress: false

jobs:
  update-video-trends:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install requests
      - name: Generate video trends
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
        run: python scripts/update_trakt_video_trends.py
      - name: Validate video trends
        run: python scripts/update_trakt_video_trends.py --validate-only
      - name: Write workflow summary
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          index = json.loads(Path("trends/video/index.json").read_text())
          total = sum(x["itemCount"] for x in index["movies"] + index["series"])
          print("## Pintu video trends refresh")
          print(f"- UTC refresh: {index['lastSuccessfulRefreshAt']}")
          print(f"- Movie sections: {index['movieSections']}")
          print(f"- Series sections: {index['seriesSections']}")
          print(f"- Total items: {total}")
          print("- Validation: passed")
          print("- lastSuccessfulRefreshAt: updated")
          print("\n### Ranking quality")
          for entry in index["movies"] + index["series"]:
              document = json.loads((Path("trends/video") / entry["path"]).read_text())
              items = document["items"]
              years = [x["year"] for x in items if x.get("year")]
              date_key = "released" if document["mediaType"] == "movie" else "firstAired"
              dates = [x[date_key] for x in items if x.get(date_key)]
              source = document["source"]
              origin = source.get("endpoint") or ", ".join(source.get("inputs", []))
              quality = document.get("quality", {})
              excluded = quality.get("candidates", len(items)) - quality.get("included", len(items))
              reasons = {k: v for k, v in quality.items() if k not in ("candidates", "included") and v}
              print(f"\n#### {document['mediaType']} / {document['section']}")
              print(f"- Source: {origin}")
              print(f"- Ranking type: {document['rankingType']}")
              print(f"- Items: {len(items)}")
              print(f"- Year range: {min(years) if years else 'n/a'} – {max(years) if years else 'n/a'}")
              print(f"- Date range: {min(dates) if dates else 'n/a'} – {max(dates) if dates else 'n/a'}")
              print(f"- Excluded: {excluded}")
              print(f"- Exclusion reasons: {reasons or 'none'}")
          PY
      - name: Commit updated video trends
        run: |
          git config user.name "Pintu Trends Bot"
          git config user.email "pintu-trends-bot@users.noreply.github.com"
          git add trends/video
          if git diff --cached --quiet; then
            echo "No video trend changes to commit."
          else
            git commit -m "chore: refresh Pintu video trends"
            git push
          fi
