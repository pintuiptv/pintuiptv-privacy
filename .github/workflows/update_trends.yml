name: Update Pintu Trends

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * *"
    - cron: "47 17 * * *"

permissions:
  contents: write

jobs:
  update-trends:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests PyJWT cryptography

      - name: Generate Apple Music trends
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_PRIVATE_KEY_BASE64 }}
        run: |
          python scripts/update_apple_trends.py

      - name: Debug generated files
        run: |
          echo "Generated trend files:"
          find trends -maxdepth 4 -type f -print || true
          echo ""
          echo "Index preview:"
          cat trends/index.json || true

      - name: Commit updated trends
        run: |
          git config user.name "pintu-trends-bot"
          git config user.email "pintu-trends-bot@users.noreply.github.com"

          git status --short
          git add -A trends

          if git diff --cached --quiet; then
            echo "No trends changes to commit."
          else
            git commit -m "Update Pintu trends"
            git push origin HEAD:main
          fi
